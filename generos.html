<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background-color: #0b0b0b;
    font-family: Arial, Helvetica, sans-serif;
    color: #fff;
}

<script>
function abrirGenero(pagina) {
    window.location.href = './' + pagina;
}
</script>

/* Título da página */
.page-title {
    padding: 16px;
    font-size: 20px;
    font-weight: 600;
}

/* Grid igual ao app */
.genres-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding: 14px;
}

/* Card */
.genre-card {
    position: relative;
    height: 115px;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
}

/* Imagem */
.genre-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Escurecimento igual ao da imagem */
.genre-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
}

/* Nome centralizado */
.genre-name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
}

/* VIP */
.genre-vip {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #f5c542;
    color: #000;
    font-size: 11px;
    font-weight: bold;
    padding: 4px 6px;
    border-radius: 6px;
    z-index: 2;
}

/* Tablet */
@media (min-width: 768px) {
    .genres-grid {
        grid-template-columns: repeat(3, 1fr);
    }

    .genre-card {
        height: 140px;
    }
}

/* Desktop */
@media (min-width: 1024px) {
    .genres-grid {
        grid-template-columns: repeat(4, 1fr);
    }

    .genre-card {
        height: 160px;
    }
}
</style>
</head>
